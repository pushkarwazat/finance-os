kind = "web"
previewPath = "/"
title = "FinanceOS"
version = "1.0.0"
id = "artifacts/finance-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24160

[services.development]
run = "pnpm --filter @workspace/finance-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finance-os", "run", "build" ]
publicDir = "artifacts/finance-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24160"
BASE_PATH = "/"
