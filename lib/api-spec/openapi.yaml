openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: FinanceOS Enterprise Finance AI Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: metrics
    description: Finance metric operations
  - name: ask
    description: AI-powered Q&A
  - name: variance
    description: Variance analysis
  - name: close
    description: Financial close management
  - name: documents
    description: Document library
  - name: governance
    description: Governance, approvals, audit
  - name: evals
    description: Agent evaluation and benchmarks
  - name: agents
    description: Agent registry and sessions

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Metrics ─────────────────────────────────────────────────
  /metrics:
    get:
      operationId: listMetrics
      tags: [metrics]
      summary: List finance metrics
      parameters:
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/MetricCategory"
        - name: period
          in: query
          schema:
            $ref: "#/components/schemas/Period"
        - name: fiscalYear
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated list of metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricListResponse"

  /metrics/summary:
    get:
      operationId: getMetricSummary
      tags: [metrics]
      summary: Get metric dashboard summary
      parameters:
        - name: period
          in: query
          schema:
            $ref: "#/components/schemas/Period"
        - name: fiscalYear
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Metric summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricSummary"

  /metrics/{id}:
    get:
      operationId: getMetric
      tags: [metrics]
      summary: Get a metric by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Metric detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Metric"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Ask ──────────────────────────────────────────────────────
  /ask:
    post:
      operationId: submitQuestion
      tags: [ask]
      summary: Submit a natural language question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
      responses:
        "200":
          description: Answer with citations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskResponse"

  /ask/sessions:
    get:
      operationId: listAskSessions
      tags: [ask]
      summary: List recent Q&A sessions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskSessionListResponse"

  # ── Variance ─────────────────────────────────────────────────
  /variance:
    get:
      operationId: listVarianceDrivers
      tags: [variance]
      summary: List variance drivers
      parameters:
        - name: metricId
          in: query
          schema:
            type: string
            format: uuid
        - name: period
          in: query
          schema:
            $ref: "#/components/schemas/Period"
        - name: fiscalYear
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: List of variance drivers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VarianceDriverListResponse"

  /variance/forecast:
    get:
      operationId: listForecasts
      tags: [variance]
      summary: List forecast vs actuals
      parameters:
        - name: period
          in: query
          schema:
            $ref: "#/components/schemas/Period"
        - name: fiscalYear
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Forecast records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastListResponse"

  # ── Close ─────────────────────────────────────────────────────
  /close/tasks:
    get:
      operationId: listCloseTasks
      tags: [close]
      summary: List financial close tasks
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/CloseTaskStatus"
        - name: period
          in: query
          schema:
            $ref: "#/components/schemas/Period"
        - name: fiscalYear
          in: query
          schema:
            type: integer
        - name: assigneeId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of close tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloseTaskListResponse"
    post:
      operationId: createCloseTask
      tags: [close]
      summary: Create a new close task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCloseTaskRequest"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloseTask"

  /close/tasks/{id}:
    get:
      operationId: getCloseTask
      tags: [close]
      summary: Get close task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Close task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloseTask"
    patch:
      operationId: updateCloseTask
      tags: [close]
      summary: Update a close task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCloseTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloseTask"

  /close/summary:
    get:
      operationId: getCloseSummary
      tags: [close]
      summary: Get close progress summary
      parameters:
        - name: period
          in: query
          schema:
            $ref: "#/components/schemas/Period"
        - name: fiscalYear
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Close summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloseSummary"

  # ── Documents ────────────────────────────────────────────────
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      parameters:
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/DocumentType"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/DocumentStatus"
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"

  /documents/stats:
    get:
      operationId: getDocumentStats
      tags: [documents]
      summary: Get document library statistics
      responses:
        "200":
          description: Document stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentStats"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Document detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  # ── Governance ───────────────────────────────────────────────
  /governance/approvals:
    get:
      operationId: listApprovals
      tags: [governance]
      summary: List approval requests
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ApprovalStatus"
        - name: resourceType
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Approval requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalListResponse"

  /governance/approvals/{id}/decide:
    post:
      operationId: decideApproval
      tags: [governance]
      summary: Approve or reject a request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionRequest"
      responses:
        "200":
          description: Updated approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRequest"

  /governance/audit:
    get:
      operationId: listAuditEvents
      tags: [governance]
      summary: List audit events
      parameters:
        - name: actorId
          in: query
          schema:
            type: string
            format: uuid
        - name: resourceType
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventListResponse"

  /governance/policies:
    get:
      operationId: listPolicies
      tags: [governance]
      summary: List governance policies
      responses:
        "200":
          description: Policies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyListResponse"

  # ── Evals ─────────────────────────────────────────────────────
  /evals/suites:
    get:
      operationId: listEvalSuites
      tags: [evals]
      summary: List benchmark suites
      responses:
        "200":
          description: Eval suites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalSuiteListResponse"

  /evals/runs:
    get:
      operationId: listEvalRuns
      tags: [evals]
      summary: List evaluation runs
      parameters:
        - name: suiteId
          in: query
          schema:
            type: string
            format: uuid
        - name: agentId
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Eval runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunListResponse"
    post:
      operationId: createEvalRun
      tags: [evals]
      summary: Start a new evaluation run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvalRunRequest"
      responses:
        "201":
          description: Created eval run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRun"

  # ── Agents ───────────────────────────────────────────────────
  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List registered agents
      responses:
        "200":
          description: Agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"

  /agents/{id}/sessions:
    get:
      operationId: listAgentSessions
      tags: [agents]
      summary: List sessions for an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Agent sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionListResponse"

components:
  schemas:
    # ── Primitives ───────────────────────────────────────────
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        statusCode:
          type: integer
      required:
        - error
        - statusCode

    Period:
      type: string
      enum: [Q1, Q2, Q3, Q4, FY, MTD, YTD, LTM]

    Currency:
      type: string
      enum: [USD, EUR, GBP, JPY, CAD]

    MetricCategory:
      type: string
      enum: [revenue, expense, margin, liquidity, leverage, efficiency, valuation, growth]

    DocumentType:
      type: string
      enum:
        [
          financial_statement,
          audit_report,
          board_deck,
          budget_model,
          variance_commentary,
          policy,
          contract,
          other,
        ]

    DocumentStatus:
      type: string
      enum: [uploading, processing, indexed, failed, archived]

    CloseTaskStatus:
      type: string
      enum: [pending, in_progress, review, approved, blocked, complete]

    ApprovalStatus:
      type: string
      enum: [pending, approved, rejected, escalated, expired]

    # ── Finance Models ───────────────────────────────────────
    Metric:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        category:
          $ref: "#/components/schemas/MetricCategory"
        description:
          type: string
        formula:
          type: string
        unit:
          type: string
          enum: [currency, percentage, ratio, count, days]
        value:
          type: number
        previousValue:
          type: number
        variance:
          type: number
        variancePct:
          type: number
        period:
          $ref: "#/components/schemas/Period"
        fiscalYear:
          type: integer
        currency:
          $ref: "#/components/schemas/Currency"
        tags:
          type: array
          items:
            type: string
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - category
        - description
        - unit
        - value
        - period
        - fiscalYear
        - currency
        - tags
        - updatedAt

    MetricListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Metric"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - data
        - total
        - limit
        - offset

    MetricSummary:
      type: object
      properties:
        totalMetrics:
          type: integer
        byCategory:
          type: object
          additionalProperties:
            type: integer
        favorableVariances:
          type: integer
        unfavorableVariances:
          type: integer
        period:
          $ref: "#/components/schemas/Period"
        fiscalYear:
          type: integer
      required:
        - totalMetrics
        - byCategory
        - favorableVariances
        - unfavorableVariances
        - period
        - fiscalYear

    VarianceDriver:
      type: object
      properties:
        id:
          type: string
          format: uuid
        metricId:
          type: string
          format: uuid
        driver:
          type: string
        impact:
          type: number
        impactPct:
          type: number
        explanation:
          type: string
        category:
          type: string
          enum: [volume, price, mix, fx, one-time, structural]
        period:
          $ref: "#/components/schemas/Period"
        fiscalYear:
          type: integer
      required:
        - id
        - metricId
        - driver
        - impact
        - impactPct
        - explanation
        - category
        - period
        - fiscalYear

    VarianceDriverListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/VarianceDriver"
        total:
          type: integer
      required:
        - data
        - total

    Forecast:
      type: object
      properties:
        id:
          type: string
          format: uuid
        metricId:
          type: string
          format: uuid
        metricName:
          type: string
        period:
          $ref: "#/components/schemas/Period"
        fiscalYear:
          type: integer
        actual:
          type: number
          nullable: true
        budget:
          type: number
        forecast:
          type: number
        prior:
          type: number
          nullable: true
        currency:
          $ref: "#/components/schemas/Currency"
        confidence:
          type: number
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - metricId
        - metricName
        - period
        - fiscalYear
        - budget
        - forecast
        - currency
        - confidence
        - updatedAt

    ForecastListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Forecast"
        total:
          type: integer
      required:
        - data
        - total

    CloseTask:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/CloseTaskStatus"
        assigneeId:
          type: string
          format: uuid
        assigneeName:
          type: string
        dueDate:
          type: string
          format: date
        closePeriod:
          $ref: "#/components/schemas/Period"
        fiscalYear:
          type: integer
        priority:
          type: string
          enum: [low, medium, high, critical]
        dependencies:
          type: array
          items:
            type: string
            format: uuid
        comments:
          type: integer
        attachments:
          type: integer
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - status
        - dueDate
        - closePeriod
        - fiscalYear
        - priority
        - dependencies
        - comments
        - attachments
        - updatedAt

    CloseTaskListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CloseTask"
        total:
          type: integer
      required:
        - data
        - total

    CreateCloseTaskRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        assigneeId:
          type: string
          format: uuid
        dueDate:
          type: string
          format: date
        closePeriod:
          $ref: "#/components/schemas/Period"
        fiscalYear:
          type: integer
        priority:
          type: string
          enum: [low, medium, high, critical]
        dependencies:
          type: array
          items:
            type: string
            format: uuid
      required:
        - name
        - dueDate
        - closePeriod
        - fiscalYear
        - priority

    UpdateCloseTaskRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/CloseTaskStatus"
        assigneeId:
          type: string
          format: uuid
        dueDate:
          type: string
          format: date
        priority:
          type: string
          enum: [low, medium, high, critical]

    CloseSummary:
      type: object
      properties:
        period:
          $ref: "#/components/schemas/Period"
        fiscalYear:
          type: integer
        totalTasks:
          type: integer
        byStatus:
          type: object
          additionalProperties:
            type: integer
        overdueTasks:
          type: integer
        completionRate:
          type: number
        criticalOpen:
          type: integer
      required:
        - period
        - fiscalYear
        - totalTasks
        - byStatus
        - overdueTasks
        - completionRate
        - criticalOpen

    # ── Ask ────────────────────────────────────────────────────
    AskRequest:
      type: object
      properties:
        question:
          type: string
        sessionId:
          type: string
          format: uuid
        filters:
          type: object
          properties:
            documentTypes:
              type: array
              items:
                $ref: "#/components/schemas/DocumentType"
            fiscalYear:
              type: integer
            period:
              $ref: "#/components/schemas/Period"
      required:
        - question

    Citation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        documentTitle:
          type: string
        chunkIndex:
          type: integer
        pageNumber:
          type: integer
        excerpt:
          type: string
        relevanceScore:
          type: number
        queryId:
          type: string
          format: uuid
      required:
        - id
        - documentId
        - documentTitle
        - chunkIndex
        - excerpt
        - relevanceScore
        - queryId

    ChartData:
      type: object
      properties:
        type:
          type: string
          enum: [bar, line, pie]
        title:
          type: string
        xKey:
          type: string
        yKeys:
          type: array
          items:
            type: string
        data:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
        - type
        - title
        - xKey
        - yKeys
        - data

    AskResponse:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
        messageId:
          type: string
          format: uuid
        question:
          type: string
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        chartData:
          $ref: "#/components/schemas/ChartData"
        agentId:
          type: string
          format: uuid
        latencyMs:
          type: integer
        tokens:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - sessionId
        - messageId
        - question
        - answer
        - citations
        - createdAt

    AskSessionSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        messageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - messageCount
        - createdAt
        - updatedAt

    AskSessionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AskSessionSummary"
        total:
          type: integer
      required:
        - data
        - total

    # ── Documents ───────────────────────────────────────────────
    Document:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        filename:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type: integer
        type:
          $ref: "#/components/schemas/DocumentType"
        status:
          $ref: "#/components/schemas/DocumentStatus"
        tags:
          type: array
          items:
            type: string
        uploadedBy:
          type: string
          format: uuid
        uploaderName:
          type: string
        chunkCount:
          type: integer
        pageCount:
          type: integer
        summary:
          type: string
        fiscalYear:
          type: integer
        period:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
