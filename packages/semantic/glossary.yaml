apiVersion: semantics.financeos.io/v1
kind: Glossary
metadata:
  description: >
    Official FinanceOS business glossary. All definitions are reviewed by the
    CFO Office quarterly. Terms here are the canonical source of truth —
    if a term appears differently in a dashboard, the glossary takes precedence.
  version: "3.0.0"

entries:
  # ── Revenue ──────────────────────────────────────────────────────────────

  - term: Total Revenue
    slug: total_revenue
    domain: revenue
    shortDefinition: Gross revenue recognized in the period before any deductions.
    definition: >
      Total Revenue is the top line of the income statement. It represents all
      revenue recognized under ASC 606 in the reporting period, including
      subscription, professional services, usage-based, and support revenue.
      It is measured before discounts, credits, or returns. Contrast with
      Net Revenue, which reflects deductions.
    formula: "SUM(gross_amount_usd) WHERE status != 'voided'"
    examples:
      - "Q3 FY2025 Total Revenue was $24.8M, up 18% YoY."
      - "Revenue by segment: Enterprise 65%, Mid-Market 25%, SMB 10%."
    relatedMetrics: [total_revenue, net_revenue, gross_margin]
    relatedDimensions: [revenue_type, customer_segment, geo_region]
    seeAlso: [net_revenue, arr, gross_margin]
    tags: [income_statement, kpi, top_line]
    certifiedBy: CFO Office
    lastReviewed: "2025-10-01"

  - term: Net Revenue
    slug: net_revenue
    domain: revenue
    shortDefinition: Revenue after discounts, credits, and returns.
    definition: >
      Net Revenue equals Total Revenue minus all customer deductions:
      contractual discounts, credit memos, and product returns.
      It is the basis for Gross Margin calculation and the most
      appropriate revenue figure for operational benchmarking.
    formula: "SUM(net_amount_usd) WHERE status NOT IN ('voided', 'reversed')"
    examples:
      - "Net Revenue was $23.1M after $1.7M in discounts and credits."
    relatedMetrics: [net_revenue, gross_margin, total_revenue]
    relatedDimensions: [revenue_type, customer_segment]
    seeAlso: [total_revenue, gross_margin]
    tags: [income_statement, kpi]
    certifiedBy: CFO Office
    lastReviewed: "2025-10-01"

  - term: Gross Margin
    slug: gross_margin
    domain: revenue
    shortDefinition: (Net Revenue - COGS) / Net Revenue — measures profitability of core product.
    definition: >
      Gross Margin measures how much revenue remains after direct costs
      (cost of goods sold, COGS) are removed. For SaaS companies, COGS
      typically includes hosting, customer support, and third-party software.
      A higher gross margin indicates more efficient product delivery.
      Best-in-class SaaS targets ≥ 70% gross margin.
    formula: "(net_revenue - cogs) / net_revenue × 100"
    examples:
      - "Gross Margin improved from 68% to 71% as infrastructure costs were optimized."
      - "Enterprise segment gross margin is 78% vs SMB at 61%."
    relatedMetrics: [gross_margin, net_revenue, total_revenue]
    relatedDimensions: [product_line, customer_segment]
    seeAlso: [net_revenue, total_revenue]
    tags: [margin, income_statement, kpi]
    certifiedBy: CFO Office
    lastReviewed: "2025-10-01"

  - term: Net Revenue Retention
    slug: net_revenue_retention
    domain: revenue
    shortDefinition: >
      Revenue retained + expanded from existing customers vs. prior period.
      NRR > 100% means the cohort is growing despite churn.
    definition: >
      Net Revenue Retention (NRR), also called Net Dollar Retention (NDR),
      measures the percentage of recurring revenue retained from existing
      customers after accounting for expansions, contractions, and churn.
      NRR > 100% indicates that expansion revenue from existing customers
      outweighs revenue lost to churn and contraction — the hallmark of
      a best-in-class SaaS business.
    formula: "(Beginning ARR + Expansion - Contraction - Churn) / Beginning ARR"
    examples:
      - "NRR of 118% means that even if we acquired zero new customers, revenue would still grow 18%."
    relatedMetrics: [net_revenue_retention, arr, mrr]
    seeAlso: [arr, customer_churn_rate, gross_margin]
    tags: [saas, retention, kpi]
    certifiedBy: CFO Office
    lastReviewed: "2025-10-01"

  # ── Subscriptions ────────────────────────────────────────────────────────

  - term: Annual Recurring Revenue
    slug: arr
    domain: subscriptions
    shortDefinition: Annualized value of all active subscription contracts at period end.
    definition: >
      ARR represents the annualized value of contracted recurring revenue.
      It is a point-in-time snapshot taken at the end of each month.
      ARR excludes one-time fees, professional services, and variable usage revenue.
      It is computed as the sum of all active subscription MRR × 12.
    formula: "SUM(mrr_usd WHERE status = 'active') × 12"
    examples:
      - "ARR crossed $100M in Q2 FY2025 — a 35% increase year over year."
    relatedMetrics: [arr, mrr, net_new_arr, net_revenue_retention]
    seeAlso: [mrr, net_new_arr, customer_churn_rate]
    tags: [saas, recurring_revenue, kpi, tier_1]
    certifiedBy: CFO Office
    lastReviewed: "2025-10-01"

  - term: Monthly Recurring Revenue
    slug: mrr
    domain: subscriptions
    shortDefinition: Total monthly subscription value of all active contracts.
    definition: >
      MRR is the normalized monthly value of all active subscription contracts.
      Annual subscriptions are divided by 12 to arrive at a monthly figure.
      MRR is the basis for ARR (MRR × 12) and the waterfall analysis
      (new, expansion, contraction, churn, reactivation).
    formula: "SUM(mrr_usd WHERE status = 'active')"
    examples:
      - "MRR grew from $7.2M to $8.5M, driven by $400K new, $900K expansion, and $100K churn."
    relatedMetrics: [mrr, arr, net_new_arr]
    seeAlso: [arr, net_new_arr]
    tags: [saas, recurring_revenue, kpi]
    certifiedBy: CFO Office
    lastReviewed: "2025-10-01"

  - term: Net New ARR
    slug: net_new_arr
    domain: subscriptions
    shortDefinition: Change in ARR during the period across all movement types.
    definition: >
      Net New ARR equals the sum of all ARR movements in a period:
      New ARR + Expansion ARR - Contraction ARR - Churned ARR + Reactivation ARR.
      Positive = the ARR base grew. Negative = the ARR base shrank.
      The primary indicator of business momentum in the current period.
    formula: "(new_mrr + expansion_mrr + reactivation_mrr - contraction_mrr - churned_mrr) × 12"
    examples:
      - "Net New ARR of $3.2M this quarter: $5M new, $2M expansion, -$3.8M churn."
    relatedMetrics: [net_new_arr, arr, mrr]
    seeAlso: [arr, mrr, customer_churn_rate]
    tags: [saas, growth, kpi]
    certifiedBy: CFO Office
    lastReviewed: "2025-10-01"

  # ── AR & Collections ─────────────────────────────────────────────────────

  - term: AR Balance
    slug: ar_balance
    domain: invoices
    shortDefinition: Total billed but uncollected amounts from customers.
    definition: >
      Accounts Receivable (AR) Balance is the sum of all outstanding invoice
      amounts that have been billed but not yet collected from customers.
      AR appears as a current asset on the balance sheet.
      It includes current invoices (not yet due) and overdue invoices.
    formula: "SUM(open_amount_usd WHERE status IN ('sent', 'partial', 'overdue'))"
    examples:
      - "AR Balance of $8.4M at month end; 72% current, 18% 1-30 days past due, 10% 31-60."
    relatedMetrics: [ar_balance, dso, collections_rate]
    seeAlso: [dso, collections_rate, bad_debt_exposure]
    tags: [ar, balance_sheet, cash_flow]
    certifiedBy: Controller
    lastReviewed: "2025-10-01"

  - term: Days Sales Outstanding
    slug: dso
    domain: invoices
    shortDefinition: Average days to collect payment after invoicing.
    definition: >
      DSO measures how many days on average it takes the company to collect
      payment after an invoice is issued. A lower DSO indicates faster collections
      and better cash flow. DSO is computed as: (AR Balance / Revenue) × Days in Period.
      Target DSO should be no more than 1.5× the payment terms (e.g., ≤ 45 days for Net 30).
    formula: "(AR Balance / Total Revenue) × Days in Period"
    examples:
      - "DSO of 38 days on Net 30 terms is healthy — most customers pay within terms."
      - "DSO rising from 35 to 52 days signals a collections bottleneck."
    relatedMetrics: [dso, ar_balance, cash_collected]
    seeAlso: [ar_balance, collections_rate]
    tags: [ar, efficiency, cash_flow, kpi]
    certifiedBy: Controller
    lastReviewed: "2025-10-01"

  - term: Collections Rate
    slug: collections_rate
    domain: collections
    shortDefinition: Percentage of billed amounts successfully collected in the period.
    definition: >
      Collections Rate measures how effectively the AR team converts billed
      invoices into cash. It is calculated as cash collected divided by total
      invoiced amount. A rate below 90% indicates a collections process issue
      or customer financial distress. Best-in-class: > 97%.
    formula: "Cash Collected / Total Invoiced Amount"
    examples:
      - "Collections Rate of 94% in Q3 — 6% of invoiced amounts remain outstanding."
    relatedMetrics: [collections_rate, cash_collected, ar_balance]
    seeAlso: [dso, ar_balance, bad_debt_exposure]
    tags: [ar, collections, efficiency, kpi]
    certifiedBy: Controller
    lastReviewed: "2025-10-01"

  - term: Bad Debt Exposure
    slug: bad_debt_exposure
    domain: collections
    shortDefinition: AR more than 90 days past due — highest write-off risk.
    definition: >
      Bad Debt Exposure is the total AR balance that is more than 90 days past due.
      These amounts require a bad-debt reserve provision per GAAP and are likely to
      require write-off or legal escalation. Finance tracks this separately from
      general overdue AR to ensure adequate reserve coverage.
    formula: "SUM(balance_usd WHERE aging_bucket = '90+')"
    relatedMetrics: [bad_debt_exposure, ar_balance, collections_rate]
    seeAlso: [ar_balance, collections_rate, dso]
    tags: [ar, risk, collections]
    certifiedBy: Controller
    lastReviewed: "2025-10-01"

  # ── Cash & Expenses ──────────────────────────────────────────────────────

  - term: Burn Rate
    slug: burn_rate
    domain: expenses
    shortDefinition: Net monthly cash outflow (OpEx minus cash collected from customers).
    definition: >
      Burn Rate is the rate at which a company spends cash each month.
      Net Burn = Total Operating Expenses - Cash Collected.
      Gross Burn = Total Operating Expenses only (ignoring revenue).
      Burn Rate drives runway calculation: Cash / Monthly Net Burn = Months of Runway.
      For pre-profitability companies, minimizing burn rate extends runway.
    formula: "Total OpEx - Cash Collected"
    examples:
      - "Net burn of $2.1M/month with $25M in cash = ~12 months runway."
    relatedMetrics: [burn_rate, total_opex, cash_collected]
    seeAlso: [total_opex, cash_collected]
    tags: [cash_flow, expenses, runway, kpi]
    certifiedBy: CFO Office
    lastReviewed: "2025-10-01"

  - term: Total OpEx
    slug: total_opex
    domain: expenses
    shortDefinition: Sum of all operating expenses excluding cost of revenue.
    definition: >
      Total Operating Expenses (OpEx) covers all expenses required to run the
      business excluding Cost of Goods Sold (COGS). Includes R&D, Sales &
      Marketing, and G&A expenses. Used for operational efficiency ratios
      and budget vs. actual variance analysis.
    formula: "SUM(amount_usd WHERE account_type = 'expense' AND is_capex = false)"
    relatedMetrics: [total_opex, burn_rate, rd_ratio]
    seeAlso: [burn_rate, gross_margin, budget_variance]
    tags: [expenses, income_statement, p_and_l]
    certifiedBy: Controller
    lastReviewed: "2025-10-01"

  # ── Planning ─────────────────────────────────────────────────────────────

  - term: Budget Variance
    slug: budget_variance
    domain: budget_vs_actual
    shortDefinition: Actual result minus budgeted amount. Positive = favorable.
    definition: >
      Budget Variance is the difference between actual financial results and the
      approved budget for the same period. For revenue metrics, positive variance
      is favorable (exceeded budget). For expense metrics, negative variance is
      favorable (spent less than budgeted). The sign convention is always:
      Actual - Budget. A ±5% variance is typically within acceptable tolerance.
    formula: "Actual Amount - Budget Amount"
    examples:
      - "Revenue variance of +$1.2M: actual $25.2M vs $24.0M budgeted (+5%)."
      - "OpEx variance of -$800K: actual $12.2M vs $13.0M budgeted (favorable)."
    relatedMetrics: [budget_variance, budget_attainment]
    seeAlso: [total_revenue, total_opex]
    tags: [planning, variance, budget, kpi]
    certifiedBy: FP&A Lead
    lastReviewed: "2025-10-01"

  # ── Customers ────────────────────────────────────────────────────────────

  - term: Active Customers
    slug: active_customers
    domain: customers
    shortDefinition: Count of customer accounts with active status at period end.
    definition: >
      Active Customers is the count of distinct customer accounts with
      status = 'active' at the end of the reporting period. Customers in
      trial, churned, or suspended states are excluded.
      This is a point-in-time count, not a period average.
    formula: "COUNT(DISTINCT customer_id WHERE status = 'active' AND snapshot_date = period_end)"
    relatedMetrics: [active_customers, customer_churn_rate, new_customers]
    seeAlso: [customer_churn_rate, arr, net_revenue_retention]
    tags: [customers, kpi, retention]
    certifiedBy: Revenue Ops
    lastReviewed: "2025-10-01"

  - term: Customer Churn Rate
    slug: churn_rate
    domain: customers
    shortDefinition: Percentage of customers lost in the period.
    definition: >
      Customer Churn Rate (Logo Churn) measures the percentage of active customers
      at the start of the period who cancelled by period end. It does not
      account for revenue — a large customer churning has the same logo impact
      as a small customer. For revenue impact, use NRR instead.
      Formula: Churned Customers / Beginning Period Customers.
    formula: "Churned Customers / Beginning-of-Period Active Customers"
    examples:
      - "Monthly logo churn of 1.2% = annual churn ~14%, above the 10% target."
    relatedMetrics: [customer_churn_rate, active_customers, new_customers]
    seeAlso: [active_customers, net_revenue_retention, arr]
    tags: [customers, churn, kpi, retention]
    certifiedBy: Revenue Ops
    lastReviewed: "2025-10-01"

  - term: Cash Collected
    slug: cash_collected
    domain: payments
    shortDefinition: Actual cash received from customers (cleared payments only).
    definition: >
      Cash Collected is the total value of cleared payment transactions received
      from customers in the period. Distinct from recognized revenue (which
      follows ASC 606 timing). Cash collected is used for treasury forecasting,
      burn rate calculation, and collections performance measurement.
    formula: "SUM(amount_usd WHERE status = 'cleared')"
    relatedMetrics: [cash_collected, collections_rate, dso]
    seeAlso: [ar_balance, dso, burn_rate]
    tags: [cash_flow, treasury, ar, kpi]
    certifiedBy: Controller
    lastReviewed: "2025-10-01"
