- apiVersion: semantics.financeos.io/v1
  kind: Measure
  metadata:
    name: total_opex
    entity: fact_expense
    domain: expenses
  spec:
    displayName: Total Operating Expenses
    description: Sum of all operating expense GL postings in the period.
    column: amount_usd
    aggregation: sum
    dataType: currency
    grain: monthly
    defaultFilters: ["account_type = 'expense'", "is_capex = false"]
    nonAdditive: false
    hidden: false

